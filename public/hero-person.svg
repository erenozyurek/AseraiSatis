<svg viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Laptop başında çalışan işletme sahibi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#213241"/>
      <stop offset="0.5" stop-color="#2f5566"/>
      <stop offset="1" stop-color="#3f7d8f"/>
    </linearGradient>
    <linearGradient id="deskLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardigan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8992f"/>
      <stop offset="1" stop-color="#cf7d1c"/>
    </linearGradient>
  </defs>

  <!-- blurred office background -->
  <rect width="1200" height="620" fill="url(#bg)"/>
  <g opacity="0.5">
    <rect x="0" y="70" width="1200" height="90" fill="#ffffff" opacity="0.05"/>
    <rect x="0" y="250" width="1200" height="70" fill="#ffffff" opacity="0.04"/>
    <circle cx="140" cy="150" r="120" fill="#5aa0b3" opacity="0.18"/>
    <circle cx="1080" cy="120" r="150" fill="#7fe3e8" opacity="0.12"/>
  </g>
  <rect x="0" y="470" width="1200" height="150" fill="url(#deskLight)"/>

  <!-- person, right side -->
  <g transform="translate(760 96)">
    <!-- chair back -->
    <rect x="70" y="150" width="300" height="360" rx="60" fill="#1a2a36" opacity="0.55"/>

    <!-- neck -->
    <rect x="178" y="128" width="70" height="70" rx="24" fill="#e8b48c"/>
    <!-- shoulders / cardigan -->
    <path d="M60 300 q0 -150 152 -150 q152 0 152 150 v230 h-304 z" fill="url(#cardigan)"/>
    <!-- striped shirt (V opening) -->
    <path d="M150 168 l62 66 l62 -66 v220 h-124 z" fill="#f2f4f2"/>
    <g clip-path="none">
      <path d="M150 210 h124 M150 246 h124 M150 282 h124 M150 318 h124 M150 354 h124"
            stroke="#3fae6a" stroke-width="14" opacity="0.9"/>
    </g>
    <!-- cardigan front edges over shirt -->
    <path d="M150 168 l62 66 v300 h-92 q-30 -140 30 -366 z" fill="url(#cardigan)"/>
    <path d="M274 168 l-62 66 v300 h92 q30 -140 -30 -366 z" fill="url(#cardigan)"/>

    <!-- head -->
    <ellipse cx="212" cy="92" rx="78" ry="86" fill="#eab98f"/>
    <!-- ears -->
    <circle cx="136" cy="96" r="14" fill="#e0a878"/>
    <circle cx="288" cy="96" r="14" fill="#e0a878"/>
    <!-- hair -->
    <path d="M136 78 q0 -84 76 -84 q76 0 76 84 q-8 -34 -76 -34 q-68 0 -76 34 z" fill="#5a4632"/>
    <path d="M132 74 q6 -18 22 -24 q-4 26 -22 40 z" fill="#5a4632"/>
    <path d="M292 74 q-6 -18 -22 -24 q4 26 22 40 z" fill="#5a4632"/>
    <!-- beard -->
    <path d="M148 118 q10 70 64 74 q54 -4 64 -74 q-18 40 -64 40 q-46 0 -64 -40 z" fill="#6b5540"/>
    <!-- eyes + brows -->
    <circle cx="186" cy="92" r="7" fill="#2c3038"/>
    <circle cx="238" cy="92" r="7" fill="#2c3038"/>
    <path d="M172 76 q14 -8 28 0 M224 76 q14 -8 28 0" stroke="#5a4632" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- subtle smile -->
    <path d="M196 128 q16 10 32 0" stroke="#c98a5e" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- forearms reaching to laptop -->
    <path d="M96 470 q-30 -110 60 -150 l40 60 q-70 34 -40 130 z" fill="url(#cardigan)"/>
    <path d="M328 470 q30 -110 -60 -150 l-40 60 q70 34 40 130 z" fill="url(#cardigan)"/>
    <!-- hands -->
    <ellipse cx="150" cy="500" rx="30" ry="20" fill="#e8b48c"/>
    <ellipse cx="274" cy="500" rx="30" ry="20" fill="#e8b48c"/>
  </g>

  <!-- laptop in front (bottom) -->
  <g transform="translate(690 470)">
    <path d="M40 120 l60 -110 h360 l60 110 z" fill="#c7ccd2"/>
    <rect x="90" y="4" width="380" height="120" rx="8" fill="#20262e"/>
    <rect x="104" y="18" width="352" height="92" rx="4" fill="#37d3db" opacity="0.25"/>
  </g>
</svg>
